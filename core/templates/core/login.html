<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>로그인 — ELS 레이더</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22%3E%3Cdefs%3E%3ClinearGradient id=%22g%22 x1=%220%22 y1=%220%22 x2=%221%22 y2=%221%22%3E%3Cstop offset=%220%22 stop-color=%22%233D8BFF%22/%3E%3Cstop offset=%221%22 stop-color=%22%231B64DA%22/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width=%2232%22 height=%2232%22 rx=%227%22 fill=%22url%28%23g%29%22/%3E%3Ccircle cx=%2216%22 cy=%2216%22 r=%229.5%22 fill=%22none%22 stroke=%22%23fff%22 stroke-width=%221.4%22 opacity=%22.4%22/%3E%3Ccircle cx=%2216%22 cy=%2216%22 r=%225%22 fill=%22none%22 stroke=%22%23fff%22 stroke-width=%221.4%22 opacity=%22.65%22/%3E%3Cpath d=%22M16 16 L16 4.8 A11.2 11.2 0 0 1 25.7 10.4 Z%22 fill=%22%23fff%22 opacity=%22.92%22/%3E%3Ccircle cx=%2216%22 cy=%2216%22 r=%221.6%22 fill=%22%23fff%22/%3E%3Ccircle cx=%2221.6%22 cy=%2220.9%22 r=%222.1%22 fill=%22%23fff%22/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: Pretendard, 'Malgun Gothic', sans-serif;
  background: #F2F4F6; display: flex; align-items: center; justify-content: center;
  min-height: 100vh; color: #191F28;
}
.login-card {
  background:#fff; border:1px solid #E5E8EB; border-radius:10px;
  padding: 40px 36px; width: 360px;
}
.login-logo { font-size: 20px; font-weight: 800; text-align:center; margin-bottom: 6px; }
.login-logo i { color:#3182F6; margin-right: 8px; }
.login-sub { text-align:center; color:#8B95A1; font-size:13px; margin-bottom: 28px; }
label { font-size:12px; font-weight:600; color:#4E5968; display:block; margin-bottom:6px; }
input {
  width:100%; padding:11px 12px; border:1px solid #E5E8EB; border-radius:7px;
  font-size:14px; font-family:inherit; outline:none; margin-bottom:16px;
}
input:focus { border-color:#3182F6; }
button {
  width:100%; padding:12px; background:#3182F6; color:#fff; border:none;
  border-radius:7px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
}
button:hover { background:#1B64DA; }
.error { background:#FDEDEB; color:#E5503C; font-size:13px; padding:10px 12px; border-radius:6px; margin-bottom:16px; font-weight:600; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="24" height="24" style="vertical-align:-4px"><defs><linearGradient id="g24" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3D8BFF"/><stop offset="1" stop-color="#1B64DA"/></linearGradient></defs><rect width="32" height="32" rx="7" fill="url(#g24)"/><circle cx="16" cy="16" r="9.5" fill="none" stroke="#fff" stroke-width="1.4" opacity=".4"/><circle cx="16" cy="16" r="5" fill="none" stroke="#fff" stroke-width="1.4" opacity=".65"/><path d="M16 16 L16 4.8 A11.2 11.2 0 0 1 25.7 10.4 Z" fill="#fff" opacity=".92"/><circle cx="16" cy="16" r="1.6" fill="#fff"/><circle cx="21.6" cy="20.9" r="2.1" fill="#fff"/></svg> <span>ELS <b style="color:#3182F6">레이더</b></span></div>
  <div class="login-sub">주간 청약 브리핑 · 포트폴리오 관리</div>
  {% if form.errors %}<div class="error">아이디 또는 비밀번호가 올바르지 않습니다.</div>{% endif %}
  <form method="post">{% csrf_token %}
    <label>아이디</label>
    <input type="text" name="username" autofocus autocomplete="username">
    <label>비밀번호</label>
    <input type="password" name="password" autocomplete="current-password">
    <label style="display:flex;align-items:center;gap:7px;margin-bottom:16px;cursor:pointer;font-size:13px;color:#4E5968">
      <input type="checkbox" name="remember" style="width:auto;margin:0" checked> 로그인 유지 (30일)
    </label>
    <button type="submit">로그인</button>
  </form>
  <div style="display:flex;justify-content:center;gap:14px;margin-top:18px;font-size:13px">
    <a href="/accounts/find-id/" style="color:#8B95A1;text-decoration:none">아이디 찾기</a>
    <span style="color:#E5E8EB">|</span>
    <a href="/accounts/password-reset/" style="color:#8B95A1;text-decoration:none">비밀번호 찾기</a>
    <span style="color:#E5E8EB">|</span>
    <a href="/accounts/signup/" style="color:#3182F6;font-weight:700;text-decoration:none">회원가입</a>
  </div>
</div>
</body>
</html>
