{% load els_extras %}
<span style="display:inline-flex;align-items:center;gap:2px;font-size:12px;color:var(--text-3)">
  <span style="margin-right:4px">표시</span>
  <a href="?{% qs_replace psize=20 hpage=None dpage=None %}"
     style="padding:3px 8px;border-radius:6px;text-decoration:none;{% if page_size == 20 %}background:var(--blue);color:#fff;font-weight:700{% else %}color:var(--text-2){% endif %}">20</a>
  <a href="?{% qs_replace psize=50 hpage=None dpage=None %}"
     style="padding:3px 8px;border-radius:6px;text-decoration:none;{% if page_size == 50 %}background:var(--blue);color:#fff;font-weight:700{% else %}color:var(--text-2){% endif %}">50</a>
  <a href="?{% qs_replace psize=100 hpage=None dpage=None %}"
     style="padding:3px 8px;border-radius:6px;text-decoration:none;{% if page_size == 100 %}background:var(--blue);color:#fff;font-weight:700{% else %}color:var(--text-2){% endif %}">100</a>
</span>
