<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>회원가입 — ELS 레이더</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22%3E%3Cdefs%3E%3ClinearGradient id=%22g%22 x1=%220%22 y1=%220%22 x2=%221%22 y2=%221%22%3E%3Cstop offset=%220%22 stop-color=%22%234E86FF%22/%3E%3Cstop offset=%221%22 stop-color=%22%232D5BFF%22/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width=%2232%22 height=%2232%22 rx=%229%22 fill=%22url%28%23g%29%22/%3E%3Ccircle cx=%2216%22 cy=%2216%22 r=%228.5%22 fill=%22none%22 stroke=%22%23fff%22 stroke-width=%222.4%22 opacity=%22.22%22/%3E%3Cpath d=%22M16 7.5 A8.5 8.5 0 0 1 23.36 20.25%22 fill=%22none%22 stroke=%22%23fff%22 stroke-width=%223%22 stroke-linecap=%22round%22/%3E%3Ccircle cx=%2223.36%22 cy=%2220.25%22 r=%224.1%22 fill=%22%23fff%22 opacity=%22.25%22/%3E%3Ccircle cx=%2223.36%22 cy=%2220.25%22 r=%222.5%22 fill=%22%23fff%22/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: Pretendard, 'Malgun Gothic', sans-serif;
  background: #F2F4F6; display: flex; align-items: center; justify-content: center;
  min-height: 100vh; color: #191F28; padding: 16px;
}
.login-card {
  background:#fff; border:1px solid #E5E8EB; border-radius:10px;
  padding: 40px 36px; width: 380px; max-width: 100%;
}
.login-logo { font-size: 20px; font-weight: 800; text-align:center; margin-bottom: 6px; }
.login-logo i { color:#3182F6; margin-right: 8px; }
.login-sub { text-align:center; color:#8B95A1; font-size:13px; margin-bottom: 28px; }
label { font-size:12px; font-weight:600; color:#4E5968; display:block; margin-bottom:6px; }
input {
  width:100%; padding:11px 12px; border:1px solid #E5E8EB; border-radius:7px;
  font-size:14px; font-family:inherit; outline:none; margin-bottom:16px;
}
input:focus { border-color:#3182F6; }
button {
  width:100%; padding:12px; background:#3182F6; color:#fff; border:none;
  border-radius:7px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
}
button:hover { background:#1B64DA; }
.error { background:#FDEDEB; color:#E5503C; font-size:13px; padding:10px 12px; border-radius:6px; margin-bottom:16px; font-weight:600; }
.hint { font-size:11px; color:#8B95A1; margin:-10px 0 14px; }
.alt { text-align:center; font-size:13px; color:#8B95A1; margin-top:18px; }
.alt a { color:#3182F6; font-weight:700; text-decoration:none; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="24" height="24" style="vertical-align:-4px"><defs><linearGradient id="g24" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4E86FF"/><stop offset="1" stop-color="#2D5BFF"/></linearGradient></defs><rect width="32" height="32" rx="9" fill="url(#g24)"/><circle cx="16" cy="16" r="8.5" fill="none" stroke="#fff" stroke-width="2.4" opacity=".22"/><path d="M16 7.5 A8.5 8.5 0 0 1 23.36 20.25" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/><circle cx="23.36" cy="20.25" r="4.1" fill="#fff" opacity=".25"/><circle cx="23.36" cy="20.25" r="2.5" fill="#fff"/></svg> <span>ELS <b style="color:#3182F6">레이더</b></span></div>
  <div class="login-sub">가입하고 나만의 ELS 포트폴리오를 관리하세요</div>
  {% if form.errors %}
  <div class="error">
    {% for field, errors in form.errors.items %}{% for e in errors %}{{ e }}<br>{% endfor %}{% endfor %}
  </div>
  {% endif %}
  <form method="post">{% csrf_token %}
    <label>아이디</label>
    <input type="text" name="username" autofocus autocomplete="username" value="{{ form.username.value|default:'' }}">
    <label>이메일</label>
    <input type="email" name="email" autocomplete="email" value="{{ form.email.value|default:'' }}">
    <div class="hint">아이디·비밀번호 찾기에 사용됩니다</div>
    <label>비밀번호</label>
    <input type="password" name="password1" autocomplete="new-password">
    <div class="hint">8자 이상, 숫자만으로는 불가</div>
    <label>비밀번호 확인</label>
    <input type="password" name="password2" autocomplete="new-password">
    <button type="submit">가입하기</button>
  </form>
  <div class="alt">이미 계정이 있나요? <a href="{% url 'login' %}">로그인</a></div>
</div>
</body>
</html>
