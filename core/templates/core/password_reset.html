<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Pretendard, 'Malgun Gothic', sans-serif; background:#F2F4F6;
  display:flex; align-items:center; justify-content:center; min-height:100vh; color:#191F28; padding:16px; }
.login-card { background:#fff; border:1px solid #E5E8EB; border-radius:10px; padding:40px 36px; width:380px; max-width:100%; }
.login-logo { font-size:20px; font-weight:800; text-align:center; margin-bottom:6px; }
.login-logo i { color:#3182F6; margin-right:8px; }
.login-sub { text-align:center; color:#8B95A1; font-size:13px; margin-bottom:28px; }
label { font-size:12px; font-weight:600; color:#4E5968; display:block; margin-bottom:6px; }
input { width:100%; padding:11px 12px; border:1px solid #E5E8EB; border-radius:7px; font-size:14px; font-family:inherit; outline:none; margin-bottom:16px; }
input:focus { border-color:#3182F6; }
button { width:100%; padding:12px; background:#3182F6; color:#fff; border:none; border-radius:7px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
button:hover { background:#1B64DA; }
.error { background:#FDEDEB; color:#E5503C; font-size:13px; padding:10px 12px; border-radius:6px; margin-bottom:16px; font-weight:600; }
.ok { background:#E8F8F0; color:#12B76A; font-size:13px; padding:10px 12px; border-radius:6px; margin-bottom:16px; font-weight:600; }
.alt { text-align:center; font-size:13px; color:#8B95A1; margin-top:18px; }
.alt a { color:#3182F6; font-weight:700; text-decoration:none; }
</style>
<title>비밀번호 찾기 — ELS 레이더</title>
</head>
<body>
<div class="login-card">
  <div class="login-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="24" height="24" style="vertical-align:-4px"><defs><linearGradient id="g24" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3D8BFF"/><stop offset="1" stop-color="#1B64DA"/></linearGradient></defs><rect width="32" height="32" rx="7" fill="url(#g24)"/><circle cx="16" cy="16" r="9.5" fill="none" stroke="#fff" stroke-width="1.4" opacity=".4"/><circle cx="16" cy="16" r="5" fill="none" stroke="#fff" stroke-width="1.4" opacity=".65"/><path d="M16 16 L16 4.8 A11.2 11.2 0 0 1 25.7 10.4 Z" fill="#fff" opacity=".92"/><circle cx="16" cy="16" r="1.6" fill="#fff"/><circle cx="21.6" cy="20.9" r="2.1" fill="#fff"/></svg> <span>ELS <b style="color:#3182F6">레이더</b></span></div>
  <div class="login-sub">가입 이메일로 비밀번호 재설정 링크를 보내드립니다</div>
  <form method="post">{% csrf_token %}
    <label>이메일</label>
    <input type="email" name="email" autofocus autocomplete="email">
    <button type="submit">재설정 링크 보내기</button>
  </form>
  <div class="alt"><a href="/accounts/login/">로그인으로 돌아가기</a></div>
</div>
</body>
</html>
